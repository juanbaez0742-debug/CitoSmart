services:
  - type: web
    name: citosmart
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/database.db
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/data/uploads
